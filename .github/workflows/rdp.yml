name: RDP by DucThang x TrueHieu (Ver Fix 4K Gaming Pro - Low Latency Max)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 1450   # 24 tiếng + 10 phút buffer

    steps:
      - name: Download and Extract Bore
        run: |
          # Tải bản Bore mới nhất cho Windows
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile bore.zip
          Expand-Archive bore.zip -DestinationPath bore

      - name: Enable RDP + Create Admin User
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          New-LocalUser "admin" -Password (ConvertTo-SecureString "WindowsRDP2026@" -AsPlainText -Force) -FullName "admin"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "admin"
          Add-LocalGroupMember -Group "Administrators" -Member "admin"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: SIÊU TỐI ƯU RDP 4K 120FPS + GAMING LOW LATENCY MAX + NHẠC MƯỢT + MẠNG SIÊU YẾU
        run: |
          Write-Host "Áp dụng SIÊU TỐI ƯU 4K FULL HD + GAMING LOW LATENCY MAX + NHẠC PRO + MẠNG RẤT YẾU..."

          # === 4K FULL HD + 120 FPS (Video/Phim/Live mượt như native) ===
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fEnableVirtualizedGraphics" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "AVCHardwareEncodePreferred" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "AVC444ModePreferred" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "MinFrameRate" -Value 120 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "MaxCompression" -Value 0 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "ColorDepth" -Value 32 -Type DWord -Force

          # TẮT LowBandwidth để chất lượng 4K cao nhất
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "fLowBandwidth" -Value 0 -Type DWord -Force

          # === GIẢM LAG HÌNH NỀN, ANIMATION (tiết kiệm băng thông cực mạnh) ===
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableWallpaper" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableFullWindowDrag" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableMenuAnims" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableThemes" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableCursorShadow" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableCursorBlinking" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fEnableDesktopComposition" -Value 0 -Type DWord -Force

          # === ƯU TIÊN AUDIO & MUSIC PRO (không rè, không giật) ===
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile' -Name "SystemResponsiveness" -Value 0 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile' -Name "NetworkThrottlingIndex" -Value 0xffffffff -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "fDisableAudioCapture" -Value 0 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "AudioQualityMode" -Value 2 -Type DWord -Force
          New-Item -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Audio' -Force | Out-Null
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Audio' -Name "Scheduling Category" -Value "High" -Type String -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Audio' -Name "Background Priority" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Audio' -Name "Priority" -Value 8 -Type DWord -Force

          # === GAMING LOW LATENCY MAX (dành cho game cụ thể - FPS/MOBA/Action) ===
          # High Performance + Game Mode
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a2b-0f0e9d0f5a3b
          
          # Tạo profile Games ưu tiên cực cao
          New-Item -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games' -Force | Out-Null
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games' -Name "Scheduling Category" -Value "High" -Type String -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games' -Name "Priority" -Value 8 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games' -Name "Background Priority" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games' -Name "GPU Priority" -Value 8 -Type DWord -Force   # Ưu tiên GPU cho game

          # Tối ưu input lag (chuột + bàn phím phản hồi cực nhanh)
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile' -Name "SystemResponsiveness" -Value 0 -Type DWord -Force

          # SIÊU TỐI ƯU MẠNG CHO GAME (giảm latency cực mạnh, dành cho game online)
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters' -Name "TCPNoDelay" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters' -Name "TCPAckFrequency" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters' -Name "Tcp1323Opts" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters' -Name "TcpWindowSize" -Value 65535 -Type DWord -Force

          # Buffer siêu lớn cho mạng yếu + game
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "MaxOutputBufferSize" -Value 65536 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "MaxInputBufferSize" -Value 65536 -Type DWord -Force

          # Tắt hoàn toàn hiệu ứng không cần thiết cho game
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableRemoteAppCaps" -Value 1 -Type DWord -Force

          # Giữ máy luôn bật 24h
          powercfg /change monitor-timeout-ac 0
          powercfg /change standby-timeout-ac 0
          powercfg /change disk-timeout-ac 0
          powercfg /change hibernate-timeout-ac 0

          Write-Host "ĐÃ ÁP DỤNG SIÊU TỐI ƯU GAMING LOW LATENCY MAX + 4K 120FPS + NHẠC MƯỢT + MẠNG RẤT YẾU!"

      - name: Start RDP Tunnel with Bore (Tự động tắt sau 24 tiếng)
        run: |
          Write-Host "======================================================================"
          Write-Host "         RDP 4K FULL HD 120FPS + GAMING LOW LATENCY MAX"
          Write-Host "         NHẠC PRO MODE + MẠNG RẤT RẤT YẾU VẪN MƯỢT - 24 TIẾNG"
          Write-Host "         (DucThang x TrueHieu - Ver Fix 4K Gaming Pro)"
          Write-Host "======================================================================"
          Write-Host "Username : admin"
          Write-Host "Password : WindowsRDP2026@"
          Write-Host "Tunnel   : Bore (Check log bên dưới để lấy địa chỉ kết nối)"
          Write-Host "Thời gian: CHẠY ĐÚNG 24 TIẾNG (1 NGÀY) rồi TỰ ĐỘNG TẮT"
          Write-Host "✅ Xem 4K FULL HD 120 FPS - SIÊU MƯỢT"
          Write-Host "✅ Chơi game LOW LATENCY MAX (input lag cực thấp)"
          Write-Host "✅ Nghe nhạc Foobar2000 / AIMP / Spotify KHÔNG GIẬT"
          Write-Host "✅ Mạng điện thoại RẤT YẾU vẫn ổn định cực mạnh"
          Write-Host "======================================================================"
          Write-Host "Đang mở cổng kết nối qua Bore..."

          # Khởi động Bore và tự động tắt sau đúng 24 tiếng
          $boreProcess = Start-Process -FilePath ".\bore\bore.exe" `
            -ArgumentList "local 3389 --to bore.pub" `
            -NoNewWindow -PassThru

          Write-Host "Bore Tunnel đã khởi động. Check log dòng 'listening at bore.pub:xxxxx' để lấy Port kết nối!"
          Write-Host "Sẽ tự động tắt sau đúng 24 tiếng (86400 giây)..."
          
          Start-Sleep -Seconds 86400

          # Tắt sạch
          Stop-Process -Id $boreProcess.Id -Force -ErrorAction SilentlyContinue
          Write-Host "ĐÃ TỰ ĐỘNG TẮT sau đúng 1 NGÀY - Hoàn tất!”
